# hyprlock — official Catppuccin Mocha theme (accent: mauve).
# From https://github.com/catppuccin/hyprlock ; local tweaks:
#   - background points at the same wallpaper swaybg uses
#   - avatar (needs ~/.face) and fingerprint prompt (no reader) blocks removed
source = $HOME/.config/hypr/mocha.conf

$accent = $mauve
$accentAlpha = $mauveAlpha
$font = JetBrainsMono Nerd Font

# GENERAL
general {
  hide_cursor = true
}

# BACKGROUND — same image as the desktop (swaybg)
background {
  monitor =
  path = /home/valer/.local/share/backgrounds/wall.jpg
  blur_passes = 2
  blur_size = 7
  color = $base
}

# NOW PLAYING (top-left) — blank when nothing is playing
label {
  monitor =
  text = cmd[update:5000] /home/valer/.config/hypr/now-playing.sh
  color = $subtext0
  font_size = 20
  font_family = $font
  position = 30, -30
  halign = left
  valign = top
}

# TIME (top-right)
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = right
  valign = top
}

# DATE (top-right, under the time)
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = right
  valign = top
}

# INPUT FIELD (centered)
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $accent
  inner_color = $surface0
  font_color = $text
  fade_on_empty = false
  placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Logged in as </i><span foreground="##$accentAlpha">$USER</span></span>
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -20
  halign = center
  valign = center
}
